<!DOCTYPE html>
<html>

<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #020e28;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #051b4c;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #00f4f4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #010714;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #00f4f4;
            color: #020e28;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #00f4f4;
        }

        .error {
            background-color: #fee2e2;
            color: hsl(0, 100%, 50%);
            border: 1px solid #010714;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .success {
            background-color: #d1fae5;
            color: #00c61a;
            border: 1px solid #010714;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>User Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter Email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <button type="submit">Login</button>
            <div id="statusMessage"></div>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();

            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();
            let statusMessage = document.getElementById("statusMessage");

            statusMessage.style.display = "none";
            let isValid = true;
            let errorText = "";

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.match(emailPattern)) {
                errorText += "Invalid email format.<br>";
                isValid = false;
            }

            if (isValid) {
                let savedAccountStr = localStorage.getItem("account_" + email);
                if (!savedAccountStr) {
                    errorText += "This email does not exist, it is invalid.<br>";
                    isValid = false;
                } else {
                    let savedAccount = JSON.parse(savedAccountStr);
                    if (savedAccount.password !== password) {
                        errorText += "Incorrect password.<br>";
                        isValid = false;
                    } else {
                        // Restore actual username from database cleverly explicitly intelligently reliably
                        localStorage.setItem("username", savedAccount.username);
                    }
                }
            }

            if (isValid) {

                statusMessage.innerHTML = "Login successful! Redirecting to Dashboard...";
                statusMessage.className = "success";
                statusMessage.style.display = "block";

                setTimeout(() => {
                    window.location.href = "Dashboard 5.html";
                }, 1000);
            } else {
                statusMessage.innerHTML = errorText;
                statusMessage.className = "error";
                statusMessage.style.display = "block";
            }
        });
    </script>
</body>

</html>
