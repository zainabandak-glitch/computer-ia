<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Crack The Code - Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #020e28;
            color: #ffffff;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .signup-container {
            background-color: #051b4c;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #55c09c;
            /* Green title */
            margin: 0 0 10px 0;
            font-size: 32px;
            letter-spacing: 1px;
        }

        .header h3 {
            color: #00f4f4;
            /* Neon green subtitle */
            margin: 0;
            font-size: 16px;
            font-weight: normal;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #010714;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: 16a34a;
            color: #020e28;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: 16a34a;
        }

        .message-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
            line-height: 1.5;
        }

        .error {
            background-color: #fee2e2;
            color: hsl(0, 100%, 50%);
            border: 1px solid #010714;
        }

        .success {
            background-color: #d1fae5;
            color: #00c61a;
            border: 1px solid #010714;
        }

        .error-list {
            margin: 10px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>

<body>

    <div class="signup-container">
        <div class="header">
            <h1>CRACK THE CODE</h1>
            <h3>Create your account</h3>
        </div>

        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter Full Name" required>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Create Username" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter Email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create Password" required>
        </div>

        <button onclick="handleSignup()">Sign Up</button>

        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        function isValidEmail(email) {
            return email.includes("@") && email.includes(".");
        }

        function handleSignup() {
            const fullName = document.getElementById("fullName").value.trim();
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const messageBox = document.getElementById("messageBox");

            // Reset message box
            messageBox.style.display = "none";
            messageBox.className = "message-box";
            messageBox.innerHTML = "";

            // Basic empty check
            if (!fullName || !username || !email || !password) {
                messageBox.innerHTML = "<strong>Error:</strong> Please fill out all fields.";
                messageBox.className = "message-box error";
                messageBox.style.display = "block";
                return;
            }

            // Email validation logic from Java
            if (!isValidEmail(email)) {
                messageBox.innerHTML = "<strong>Error:</strong> Invalid email address (must contain '@' and '.').";
                messageBox.className = "message-box error";
                messageBox.style.display = "block";
                return;
            }

            // Password validation logic from Java
            let hasError = false;
            let errorHtml = "<strong>Password must:</strong><ul class='error-list'>";

            if (password.length < 12) {
                errorHtml += "<li>Be at least 12 characters long</li>";
                hasError = true;
            }

            let hasDigit = false;
            let hasSpecial = false;

            for (let i = 0; i < password.length; i++) {
                const c = password[i];
                if (c >= '0' && c <= '9') {
                    hasDigit = true;
                }
                const isLetterOrDigit = (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') || (c >= '0' && c <= '9');
                if (!isLetterOrDigit) {
                    hasSpecial = true;
                }
            }

            if (!hasDigit) {
                errorHtml += "<li>Contain at least 1 digit</li>";
                hasError = true;
            }

            if (!hasSpecial) {
                errorHtml += "<li>Contain at least 1 special character</li>";
                hasError = true;
            }

            errorHtml += "</ul>";

            if (hasError) {
                messageBox.innerHTML = errorHtml;
                messageBox.className = "message-box error";
                messageBox.style.display = "block";
                return;
            }

            // Check if username already exists by iterating through accounts
            let isUsernameTaken = false;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith("account_")) {
                    try {
                        const savedAccount = JSON.parse(localStorage.getItem(key));
                        if (savedAccount.username && savedAccount.username.toLowerCase() === username.toLowerCase()) {
                            isUsernameTaken = true;
                            break;
                        }
                    } catch (e) {
                        // ignore broken json
                    }
                }
            }

            if (isUsernameTaken) {
                messageBox.innerHTML = "<strong>Error:</strong> Username already taken. Please choose another.";
                messageBox.className = "message-box error";
                messageBox.style.display = "block";
                return;
            }

            // Check if email already exists in local DB accurately
            if (localStorage.getItem("account_" + email)) {
                messageBox.innerHTML = "<strong>Error:</strong> This email is already registered. Please log in instead.";
                messageBox.className = "message-box error";
                messageBox.style.display = "block";
                return;
            }

            // Success state
            messageBox.innerHTML = "<strong>Sign up successful!</strong><br><br>Welcome, " + username + "! Redirecting to Dashboard...";
            messageBox.className = "message-box success";
            messageBox.style.display = "block";

            // Save username to the browser strictly successfully
            localStorage.setItem("username", username);

            // Save email/password to mock local database
            const accountData = { username: username, password: password };
            localStorage.setItem("account_" + email, JSON.stringify(accountData));

            setTimeout(() => {
                window.location.href = "Dashboard 5.html";
            }, 1000);
        }
    </script>

</body>

</html>
